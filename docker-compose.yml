# CodeAtlas — local dev stub (CLAUDE.md §8).
#
# This is a SCAFFOLD placeholder for the bootstrap task. The Dockerfiles it
# references are added in a later task; base images MUST stay pinned to the
# single Python (3.12) and single Node (22) versions used everywhere else
# (CLAUDE.md §10). Chroma runs embedded in the backend and persists to a volume.

services:
  backend:
    build:
      # Build context is the REPO ROOT so the single workspace uv.lock + root
      # pyproject are available to the build (CLAUDE.md §8, §10).
      context: .
      dockerfile: backend/Dockerfile  # FROM python:3.12-slim (added in a later task)
    env_file:
      - ./.env                        # project-global .env at the repo root
    ports:
      - "8000:8000"
    volumes:
      - codeatlas-data:/app/data      # Chroma collection + index persist here

